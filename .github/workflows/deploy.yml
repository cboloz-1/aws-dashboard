name: Deploy Infrastructure

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: ./terraform

jobs:
  checkov-scan:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          soft_fail: true
          output_format: cli

  terraform-deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: checkov-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_public_key: ${{ secrets.AWS_PUBLIC_KEY }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan -no-color \
            -var="public_key=ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJc4gtw82pGbxPwgqciDMA/mgadwamWUPqfuHxlM626j"
        continue-on-error: false

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -auto-approve -no-color \
            -var="public_key=ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJc4gtw82pGbxPwgqciDMA/mgadwamWUPqfuHxlM626j"


      - name: Notify success
        if: success()
        run: |
          aws sns publish \
            --topic-arn "${{ secrets.SNS_TOPIC_ARN }}" \
            --subject "Deployment Successful" \
            --message "Pipeline ran successfully on $(date). Terraform apply completed with no errors. Branch: ${{ github.ref_name }} | Commit: ${{ github.sha }}" \
            --region ${{ env.AWS_REGION }}

      - name: Notify failure
        if: failure()
        run: |
          aws sns publish \
            --topic-arn "${{ secrets.SNS_TOPIC_ARN }}" \
            --subject "Deployment Failed" \
            --message "Pipeline failed on $(date). Check GitHub Actions for details. Branch: ${{ github.ref_name }} | Commit: ${{ github.sha }}" \
            --region ${{ env.AWS_REGION }}